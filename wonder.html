<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wonder — Vrushtee</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600&family=Work+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --deep-red: #8B0000;
            --medium-red: #C41E3A;
            --warm-yellow: #FFB000;
            --light-cream: #FFF9F0;
            --text-dark: #1a1a1a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Work Sans', sans-serif;
            background: linear-gradient(135deg, var(--light-cream) 0%, #FFFBF5 100%);
            color: var(--text-dark);
            line-height: 1.7;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        #aurora {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            opacity: 0.4;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            right: -10%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, var(--warm-yellow) 0%, transparent 70%);
            opacity: 0.08;
            z-index: -1;
            animation: float 20s ease-in-out infinite;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -30%;
            left: -10%;
            width: 50%;
            height: 50%;
            background: radial-gradient(circle, var(--medium-red) 0%, transparent 70%);
            opacity: 0.06;
            z-index: -1;
            animation: float 25s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(20px, 20px) rotate(5deg); }
        }

        /* Header Navigation */
        header {
            padding: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo {
            font-family: 'Crimson Pro', serif;
            font-size: 24px;
            font-weight: 600;
            color: var(--deep-red);
            text-decoration: none;
        }

        .header-nav {
            display: flex;
            gap: 32px;
        }

        .header-nav a {
            font-size: 15px;
            font-weight: 400;
            text-decoration: none;
            color: var(--text-dark);
            position: relative;
            letter-spacing: 0.5px;
            transition: color 0.3s ease;
        }

        .header-nav a.active {
            color: var(--deep-red);
        }

        .header-nav a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--deep-red), var(--warm-yellow));
            transition: width 0.3s ease;
        }

        .header-nav a:hover::after,
        .header-nav a.active::after {
            width: 100%;
        }

        .header-social {
            display: flex;
            gap: 20px;
        }

        .header-social a {
            font-size: 14px;
            color: var(--medium-red);
            text-decoration: none;
            font-weight: 400;
            transition: color 0.2s ease;
        }

        .header-social a:hover {
            color: var(--deep-red);
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 40px 32px 80px;
            position: relative;
        }

        .page-title {
            font-family: 'Crimson Pro', serif;
            font-size: 64px;
            font-weight: 600;
            margin-bottom: 16px;
            background: linear-gradient(135deg, var(--deep-red) 0%, var(--medium-red) 50%, var(--warm-yellow) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0;
            animation: fadeInUp 1s ease forwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .accent-line {
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, var(--deep-red), var(--warm-yellow));
            margin-bottom: 48px;
            opacity: 0;
            animation: expandWidth 1.5s ease 0.4s forwards;
        }

        @keyframes expandWidth {
            from {
                width: 0;
                opacity: 0;
            }
            to {
                width: 80px;
                opacity: 1;
            }
        }

        .content {
            opacity: 0;
            animation: fadeInUp 1s ease 0.5s forwards;
        }

        .content p {
            font-size: 18px;
            line-height: 1.8;
            margin-bottom: 24px;
        }

        .content strong {
            color: var(--deep-red);
            font-weight: 500;
        }

        .article {
            margin-top: 8px;
        }

        .article-title {
            font-family: 'Crimson Pro', serif;
            font-size: 36px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 12px;
            line-height: 1.2;
        }

        .article-meta {
            font-size: 14px;
            color: var(--medium-red);
            font-weight: 300;
            letter-spacing: 0.5px;
            margin-bottom: 40px;
        }

        .article p {
            font-size: 18px;
            line-height: 1.85;
            margin-bottom: 24px;
        }

        .article p:last-child {
            margin-bottom: 0;
        }

        .article a {
            color: var(--deep-red);
            text-decoration: none;
            border-bottom: 1px solid rgba(139, 0, 0, 0.3);
            transition: border-color 0.2s ease, color 0.2s ease;
        }

        .article a:hover {
            border-bottom-color: var(--deep-red);
            color: var(--medium-red);
        }

        .article-section {
            font-family: 'Crimson Pro', serif;
            font-size: 22px;
            font-weight: 600;
            color: var(--deep-red);
            margin-top: 48px;
            margin-bottom: 20px;
        }

        .blog-list {
            list-style: none;
        }

        .blog-entry {
            display: block;
            text-decoration: none;
            color: inherit;
            padding: 28px 24px;
            margin: 0 -24px 0 -24px;
            border-radius: 8px;
            border-bottom: none;
            transition: background 0.2s ease, color 0.2s ease;
        }

        .blog-entry:hover {
            background: rgba(139, 0, 0, 0.04);
        }

        .blog-entry-title {
            font-family: 'Crimson Pro', serif;
            font-size: 26px;
            font-weight: 600;
            color: var(--text-dark);
            line-height: 1.35;
            transition: color 0.2s ease;
        }

        .blog-entry:hover .blog-entry-title {
            color: var(--deep-red);
        }

        .blog-entry-meta {
            font-size: 14px;
            color: var(--medium-red);
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        @media (max-width: 640px) {
            header {
                flex-direction: column;
                gap: 24px;
                padding: 24px;
            }

            .header-nav {
                gap: 24px;
            }

            .container {
                padding: 32px 24px 60px;
            }

            .page-title {
                font-size: 48px;
            }
        }
    </style>
</head>
<body>
    <canvas id="aurora"></canvas>

    <header>
        <a href="index.html" class="logo">Vrushtee</a>
        <nav class="header-nav">
            <a href="wonder.html" class="active">Wonder</a>
            <a href="work.html">Work</a>
            <a href="imagine.html">Imagine</a>
        </nav>
        <div class="header-social">
            <a href="https://github.com/vruga" target="_blank" rel="noopener">GitHub</a>
            <a href="https://x.com/vruga_" target="_blank" rel="noopener">X</a>
        </div>
    </header>

    <div class="container">
        <h1 class="page-title">Wonder</h1>

        <div class="accent-line"></div>

        <nav class="blog-list content">
            <a href="wonder-so100.html" class="blog-entry">
                <h2 class="blog-entry-title">My First SO100 Repo</h2>
            </a>
            <a href="wonder-robot-learning.html" class="blog-entry">
                <h2 class="blog-entry-title">Robot learning</h2>
            </a>
            <a href="wonder-robotics-three-things.html" class="blog-entry">
                <h2 class="blog-entry-title">Robotics changes everyday but it is still the same three things</h2>
            </a>
        </nav>
    </div>

    <script>
        const auroraCanvas = document.getElementById('aurora');
        const auroraCtx = auroraCanvas.getContext('2d');

        function resizeAurora() {
            auroraCanvas.width = window.innerWidth;
            auroraCanvas.height = window.innerHeight;
        }
        resizeAurora();
        window.addEventListener('resize', resizeAurora);

        class AuroraWave {
            constructor(baseY, amplitude, frequency, speed, color) {
                this.baseY = baseY;
                this.amplitude = amplitude;
                this.frequency = frequency;
                this.speed = speed;
                this.color = color;
                this.offset = Math.random() * Math.PI * 2;
            }

            draw(time) {
                auroraCtx.beginPath();

                for (let x = 0; x <= auroraCanvas.width; x += 2) {
                    const y = this.baseY +
                             Math.sin(x * this.frequency + time * this.speed + this.offset) * this.amplitude +
                             Math.sin(x * this.frequency * 0.5 + time * this.speed * 1.3) * this.amplitude * 0.5;

                    if (x === 0) {
                        auroraCtx.moveTo(x, y);
                    } else {
                        auroraCtx.lineTo(x, y);
                    }
                }

                auroraCtx.lineTo(auroraCanvas.width, auroraCanvas.height);
                auroraCtx.lineTo(0, auroraCanvas.height);
                auroraCtx.closePath();

                const gradient = auroraCtx.createLinearGradient(0, this.baseY - this.amplitude * 2, 0, this.baseY + this.amplitude * 3);
                gradient.addColorStop(0, this.color.replace('ALPHA', '0'));
                gradient.addColorStop(0.3, this.color.replace('ALPHA', '0.15'));
                gradient.addColorStop(0.6, this.color.replace('ALPHA', '0.08'));
                gradient.addColorStop(1, this.color.replace('ALPHA', '0'));

                auroraCtx.fillStyle = gradient;
                auroraCtx.fill();
            }
        }

        const waves = [
            new AuroraWave(auroraCanvas.height * 0.3, 60, 0.003, 0.0008, 'rgba(139, 0, 0, ALPHA)'),
            new AuroraWave(auroraCanvas.height * 0.25, 80, 0.002, 0.0006, 'rgba(196, 30, 58, ALPHA)'),
            new AuroraWave(auroraCanvas.height * 0.35, 70, 0.0025, 0.0007, 'rgba(255, 176, 0, ALPHA)'),
            new AuroraWave(auroraCanvas.height * 0.4, 50, 0.004, 0.0009, 'rgba(139, 0, 0, ALPHA)'),
            new AuroraWave(auroraCanvas.height * 0.2, 90, 0.0015, 0.0005, 'rgba(255, 176, 0, ALPHA)')
        ];

        function animateAurora() {
            auroraCtx.clearRect(0, 0, auroraCanvas.width, auroraCanvas.height);
            const time = Date.now() * 0.001;
            waves.forEach(wave => wave.draw(time));
            requestAnimationFrame(animateAurora);
        }

        animateAurora();
    </script>
</body>
</html>
